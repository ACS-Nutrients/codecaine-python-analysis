name: Deploy to ECS

on:
  push:
    branches: [deploy]
    paths: ['app/**', 'Dockerfile', 'requirements.txt', '.github/workflows/deploy.yml']
  workflow_dispatch:

env:
  AWS_REGION: ap-northeast-2
  ECR_REGISTRY: 620758375333.dkr.ecr.ap-northeast-2.amazonaws.com
  ECR_REPOSITORY: cdci-prd-analysis
  SERVICE_NAME: analysis
  CLUSTER: cdci-prd-cluster

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push image
        id: build
        run: |
          TAG=$(date -u +%s)
          IMAGE=${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:$TAG
          docker build -t $IMAGE .
          docker push $IMAGE
          echo "image=$IMAGE" >> $GITHUB_OUTPUT

      - name: Get latest task definition
        run: |
          aws ecs describe-task-definition \
            --task-definition cdci-prd-${{ env.SERVICE_NAME }} \
            --query taskDefinition \
          | jq 'del(.enableFaultInjection)' > task-definition.json

      - name: Update task definition with new image
        id: task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: task-definition.json
          container-name: ${{ env.SERVICE_NAME }}
          image: ${{ steps.build.outputs.image }}

      - name: Deploy to ECS
        uses: aws-actions/amazon-ecs-deploy-task-definition@v1
        with:
          task-definition: ${{ steps.task-def.outputs.task-definition }}
          service: cdci-prd-${{ env.SERVICE_NAME }}-service
          cluster: ${{ env.CLUSTER }}
          wait-for-service-stability: true
